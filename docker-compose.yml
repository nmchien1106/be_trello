services:
    backend:
        build:
            context: .
            dockerfile: dockerfile
        container_name: trello-backend
        ports:
            - '3000:3000'
        env_file:
            - .env
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_USERNAME: ${DB_USERNAME:-postgres}
            DB_PASSWORD: ${DB_PASSWORD:-postgres}
            DB_DATABASE: ${DB_DATABASE:-backend_trello}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_URL: redis://redis:6379
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - trello-network

    redis:
        image: redis:7-alpine
        container_name: trello-redis
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
            - trello-network

    db:
        image: postgres:15-alpine
        container_name: trello-db
        environment:
            POSTGRES_USER: ${DB_USERNAME:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
            POSTGRES_DB: ${DB_DATABASE:-backend_trello}
        ports:
            - '5433:5432'
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-backend_trello}']
            interval: 10s
            timeout: 5s
            retries: 10
        restart: unless-stopped
        networks:
            - trello-network

volumes:
    db_data:

networks:
    trello-network:
        driver: bridge
